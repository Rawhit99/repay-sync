services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: repaysync
      POSTGRES_PASSWORD: repaysync
      POSTGRES_DB: repaysync
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repaysync -d repaysync"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://repaysync:repaysync@db:5432/repaysync
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
